# This workflow is used to validate compatibility across all Python versions (3.10 to 3.14) on Windows.
name: Windows PR Matrix

on:
  pull_request:

jobs:
  windows-pr-matrix:
    runs-on: windows-latest

    strategy:
      fail-fast: true
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        id: py
        with:
          python-version: ${{matrix.python-version}}
          cache: pip

      - name: Install vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$env:GITHUB_WORKSPACE\vcpkg"
          cmd /c ".\vcpkg\bootstrap-vcpkg.bat -disableMetrics"

      - name: Install native dependencies
        shell: pwsh
        run: |
          .\vcpkg\vcpkg.exe install --triplet x64-windows-static --x-manifest-root=engine

      - name: Run Python compile, native, unit and import tests
        shell: bash
        env:
          PY: ${{ steps.py.outputs.python-path }}
          PYTHON_VERSION: ${{ matrix.python-version }}
          BUILD_DIR: build-${{ runner.os }}-${{ matrix.python-version }}
        run: |
          PY_TAG="${PYTHON_VERSION//./}"
          VCPKG_ROOT="$GITHUB_WORKSPACE/vcpkg"

          "$PY" --version
          "$PY" -m pip install --upgrade pip setuptools wheel

          cmake -S engine -B "$BUILD_DIR" \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-windows-static \
            -DPython_EXECUTABLE="$PY" \
            -DGRAFYTE_PY_TAG=py${PY_TAG}

          cmake --build "$BUILD_DIR" --target grafyte_tests grafyte_py${PY_TAG} --config Release
          ctest --test-dir "$BUILD_DIR" --output-on-failure --build-config Release

          mkdir -p src/__grafyte_internal
          cp -f "src/built-win/grafyte_py${PY_TAG}.pyd" src/__grafyte_internal/

          "$PY" -m pip install .
          "$PY" -m compileall src tests
          "$PY" -m unittest discover -s tests -p "test_import.py" -v
          "$PY" -m unittest discover -s tests -p "test_unit_*.py" -v
