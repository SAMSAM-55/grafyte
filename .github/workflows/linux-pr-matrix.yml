# This workflow is used to validate compatibility across all Python versions (3.10 to 3.14) on Linux.
name: Linux PR Matrix

on:
  pull_request:

jobs:
  linux-pr-matrix:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - uses: actions/checkout@v4

      - name: Build native test image
        run: docker build -f .devcontainer/Dockerfile -t grafyte-ci .

      - name: Run Python compile, native, unit and import tests
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: >
          docker run --rm
          -v "${{ github.workspace }}:/work"
          -w /work
          -e PYTHON_VERSION
          grafyte-ci
          bash -lc '
            set -euo pipefail
            PY_TAG=${PYTHON_VERSION//./}
            PY="/opt/python/cp${PY_TAG}-cp${PY_TAG}/bin/python"
            BUILD_DIR="engine/build-pr-${PY_TAG}"

            "$PY" --version
            "$PY" -m pip install --upgrade pip setuptools wheel

            cmake -S engine -B "$BUILD_DIR" \
              -G Ninja \
              -DVCPKG_TARGET_TRIPLET=x64-linux \
              -DPython_EXECUTABLE="$PY" \
              -DGRAFYTE_PY_TAG=py${PY_TAG}

            cmake --build "$BUILD_DIR" --target grafyte_tests grafyte_py${PY_TAG}
            ctest --test-dir "$BUILD_DIR" --output-on-failure

            mkdir -p src/__grafyte_internal
            cp -f "src/built-linux/grafyte_py${PY_TAG}.so" src/__grafyte_internal/

            "$PY" -m pip install .
            "$PY" -m compileall src tests
            "$PY" -m unittest discover -s tests -p "test_import.py" -v
            "$PY" -m unittest discover -s tests -p "test_unit_*.py" -v
          '
